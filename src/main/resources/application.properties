spring.application.name=smart-inventory-backend
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/inventorydb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true

# JWT
app.jwt.secret=SmartInventorySecretKey2025SuperSecureBase64EncodedKeyForJWTSigning
app.jwt.expiration-ms=86400000

# File Upload
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Scheduling
spring.task.scheduling.pool.size=5

# Logging
logging.level.com.smartinventory=DEBUG
logging.level.org.springframework.security=INFO

# Mail Configuration (Gmail SMTP - update credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# App name for emails
app.name=Smart Inventory Platform
app.frontend.url=http://localhost:4200
